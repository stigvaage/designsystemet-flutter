name: Publish MCP Server

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@stigvaage'

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish (forhåndsutgivelser → beta dist-tag)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then TAG=beta; else TAG=latest; fi
          echo "Publiserer $VERSION med dist-tag '$TAG'"
          npm publish --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
