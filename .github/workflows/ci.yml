name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Dart-bibliotek (format, analyse, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  widgetbook:
    name: Widgetbook (analyse + bygg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Widgetbook dependencies
        run: cd widgetbook && flutter pub get

      - name: Analyze Widgetbook
        run: cd widgetbook && flutter analyze --no-fatal-infos

      - name: Build Widgetbook
        run: cd widgetbook && flutter build web --no-tree-shake-icons

  mcp-server:
    name: MCP-server (bygg + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP dependencies
        run: cd mcp-server && npm ci

      - name: Build MCP server
        run: cd mcp-server && npm run build

      - name: Run MCP tests
        run: cd mcp-server && npm test

  site:
    name: Dokumentasjonsside (bygg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build VitePress documentation
        run: cd site && npm run build
